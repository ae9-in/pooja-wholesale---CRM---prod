services:
  - type: web
    name: wholesale-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: MAX_FILE_SIZE_MB
        value: 5
      - key: DEFAULT_OPERATOR_EMAIL
        value: admin@wholesale.local
      - key: CRON_SECRET
        sync: false
