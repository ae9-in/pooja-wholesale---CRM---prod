version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - DATABASE_URL=${DATABASE_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - UPLOAD_DIR=uploads
      - MAX_FILE_SIZE_MB=5
      - DEFAULT_OPERATOR_EMAIL=${DEFAULT_OPERATOR_EMAIL:-admin@wholesale.local}
      - CRON_SECRET=${CRON_SECRET}
    volumes:
      - uploads:/app/backend/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001/api/v1/dashboard/summary', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

volumes:
  uploads:
    driver: local
